<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    Base href is set by Flutter's --base-href build argument.
    For custom domain hosting (e.g., yourname.me): use "/"
    For GitHub Pages project site: use "/repo-name/"
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SECURITY HEADERS -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline' https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com https://www.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.groq.com https://api.emailjs.com https://r.jina.ai https://www.gstatic.com https://fonts.gstatic.com;">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-XSS-Protection" content="1; mode=block">

  <!-- SEO Meta Tags -->
  <title>Grasp Scholarly — Autonomous Vision AI & High-Speed Research</title>
  <link rel="canonical" href="https://grasptool.app" />
  <meta name="description" content="Grasp Scholarly is a premium, AI-powered RSVP environment. Transcribe handwritten notes via Vision OCR, read at 1000 WPM, and generate LPU-accelerated study synthetics instantly.">
  <meta name="keywords" content="RSVP, scholarly tool, vision OCR, speed reading, Groq LPU, academic research, study tool, student focus">
  <meta name="author" content="Amogh Vyas">

  <!-- Open Graph / Social Sharing -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Grasp Scholarly">
  <meta property="og:description" content="Autonomous Vision AI & High-Speed Research Suite. Read handwritten notes and scanned PDFs at the speed of thought.">
  <meta property="og:image" content="icons/Icon-512.png">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Grasp Scholarly">
  <meta name="theme-color" content="#1C1C1E">
  <link rel="manifest" href="manifest.json">

  <!-- Preconnect to Google Fonts for faster loading -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>
<body>
  <script>
    let deferredPrompt;

    window.addEventListener('beforeinstallprompt', (e) => {
      // Prevent the mini-infobar from appearing on mobile
      e.preventDefault();
      // Stash the event so it can be triggered later
      deferredPrompt = e;
      
      // Notify Flutter that the app is installable
      // We'll poll this from Dart or use a custom event
      window.isPWAInstallable = true;
    });

    window.promptInstall = async () => {
      if (!deferredPrompt) {
        console.log('Installation not available or already installed.');
        return;
      }
      
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      console.log(`User response to install: ${outcome}`);
      
      if (outcome === 'accepted') {
        deferredPrompt = null;
        window.isPWAInstallable = false;
      }
    };

    // Initialize as false
    window.isPWAInstallable = false;
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
