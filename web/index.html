<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    Base href is set by Flutter's --base-href build argument.
    For custom domain hosting (e.g., yourname.me): use "/"
    For GitHub Pages project site: use "/repo-name/"
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO Meta Tags -->
  <title>Grasp — Read Faster, Retain More, Ace Every Exam</title>
  <meta name="description" content="Grasp is a free, AI-powered speed reading app using RSVP technology. Upload text, PDFs, or Word docs — get summaries, exam questions, and read at up to 1000 WPM.">
  <meta name="keywords" content="RSVP, speed reading, rapid serial visual presentation, reading trainer, study tool, student">
  <meta name="author" content="RSVP Reader">

  <!-- Open Graph / Social Sharing -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="RSVP Speed Reader">
  <meta property="og:description" content="Free speed reading app using RSVP technology. Paste text or upload files and read at up to 1000 WPM.">
  <meta property="og:image" content="icons/Icon-512.png">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="RSVP Reader">
  <meta name="theme-color" content="#0A0A0F">
  <link rel="manifest" href="manifest.json">

  <!-- Preconnect to Google Fonts for faster loading -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>
<body>
  <script>
    let deferredPrompt;

    window.addEventListener('beforeinstallprompt', (e) => {
      // Prevent the mini-infobar from appearing on mobile
      e.preventDefault();
      // Stash the event so it can be triggered later
      deferredPrompt = e;
      
      // Notify Flutter that the app is installable
      // We'll poll this from Dart or use a custom event
      window.isPWAInstallable = true;
    });

    window.promptInstall = async () => {
      if (!deferredPrompt) {
        console.log('Installation not available or already installed.');
        return;
      }
      
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      console.log(`User response to install: ${outcome}`);
      
      if (outcome === 'accepted') {
        deferredPrompt = null;
        window.isPWAInstallable = false;
      }
    };

    // Initialize as false
    window.isPWAInstallable = false;
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
