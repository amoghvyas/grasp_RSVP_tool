<!DOCTYPE html>
<html lang="en">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SECURITY HEADERS -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline' https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com https://www.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.groq.com https://api.emailjs.com https://r.jina.ai https://www.gstatic.com https://fonts.gstatic.com https://raw.githubusercontent.com https://github.githubassets.com https://cdn-icons-png.flaticon.com https://grasp-scholarly-default-rtdb.asia-southeast1.firebasedatabase.app wss://grasp-scholarly-default-rtdb.asia-southeast1.firebasedatabase.app;">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">

  <!-- SEO Meta Tags -->
  <title>Grasp Scholarly — Autonomous Vision AI & High-Speed Research</title>
  <link rel="canonical" href="https://grasptool.app" />
  <meta name="description" content="Grasp Scholarly is a premium, AI-powered RSVP environment. Transcribe handwritten notes via Vision OCR, read at 1000 WPM, and generate LPU-accelerated study synthetics instantly.">
  <meta name="keywords" content="RSVP, scholarly tool, vision OCR, speed reading, Groq LPU, academic research, study tool, student focus">
  <meta name="author" content="Amogh Vyas">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Grasp Scholarly">
  <meta name="theme-color" content="#1C1C1E">
  <link rel="manifest" href="manifest.json">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>
    body {
      background-color: #000000;
      margin: 0;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    #loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: opacity 0.5s ease-out;
    }
    .logo-container {
      width: 100px;
      height: 100px;
      position: relative;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .loader {
      position: absolute;
      width: 100%;
      height: 100%;
      border: 2px solid rgba(255, 255, 255, 0.05);
      border-top: 2px solid #00A2FF;
      border-radius: 50%;
      animation: spin 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
    }
    .logo-center {
      color: white;
      font-size: 32px;
      font-weight: 900;
      letter-spacing: -2px;
      animation: heartbeat 2s ease-in-out infinite;
    }
    .loading-text {
      color: rgba(255, 255, 255, 0.4);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .shimmer {
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
      background-size: 200% 100%;
      animation: shimmer 2s infinite;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes heartbeat {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.05); opacity: 1; }
    }
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    .fade-out {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="loading-container">
    <div class="logo-container">
      <div class="loader"></div>
      <div class="logo-center">G</div>
    </div>
    <div class="loading-text shimmer">Grasp Scholarly</div>
  </div>

  <script>
    // Force the use of the HTML renderer for significantly faster initial load.
    // This avoids downloading the heavy CanvasKit engine (~2.5MB), reducing startup time.
    window.flutterWebRenderer = 'html';

    // Ultra-Fast Fast Scholarly Boot Protocol
    window.addEventListener('load', function(ev) {
      if (typeof _flutter === 'undefined') return;
      
      _flutter.loader.load({
        onEntrypointLoaded: async function(engineInitializer) {
          const appRunner = await engineInitializer.initializeEngine({
             renderer: 'html',
             useColorEmoji: true
          });
          
          await appRunner.runApp();
          
          const loading = document.getElementById('loading-container');
          if (loading) {
            loading.style.opacity = '0';
            setTimeout(() => loading.remove(), 500);
          }
        }
      });
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
