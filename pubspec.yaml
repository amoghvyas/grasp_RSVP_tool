name: rsvp_reader
description: "RSVP Speed Reader — A Flutter Web app using Rapid Serial Visual Presentation to help students read faster."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # File input
  file_picker: ^8.0.0
  flutter_dropzone: ^4.0.0

  # File parsing
  docx_to_text: ^1.0.1
  syncfusion_flutter_pdf: ^27.1.48

  # Typography
  google_fonts: ^6.2.1
  url_launcher: ^6.3.0
  shared_preferences: ^2.5.2
  csv: ^6.0.0
  path_provider: ^2.1.5
  just_audio: ^0.9.42
  just_audio_web: ^0.4.16
  flutter_tts: ^4.2.2
  http: ^1.2.1
  html: ^0.15.4
  web: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
