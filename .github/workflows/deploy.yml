# GitHub Actions: Build Flutter Web and Deploy to GitHub Pages
#
# This workflow runs on every push to the `main` branch.
# It builds the Flutter web release and publishes it to GitHub Pages.
#
# ── Configuration ──────────────────────────────────────────────────
# If you are using a CUSTOM DOMAIN (e.g. yourname.me):
#   - Set --base-href to "/"
#   - Add a CNAME file in web/ with your domain name
#
# If you are using default GitHub Pages (username.github.io/repo-name):
#   - The workflow automatically detects the repo name for --base-href

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

# Sets permissions for GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      # Build with the base path from GitHub Pages configuration.
      # If you have a custom domain, this will resolve to "/".
      # If not, it resolves to "/repo-name/".
      # GEMINI_API_KEY is stored as a GitHub repository secret.
      - name: Build Flutter Web
        run: flutter build web --release --base-href "${{ steps.pages.outputs.base_path }}/" --web-renderer canvaskit --dart-define=GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
