name: rsvp_reader
description: "RSVP Speed Reader — A Flutter Web app using Rapid Serial Visual Presentation to help students read faster."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # File input
  file_picker: ^8.0.0
  flutter_dropzone: ^4.0.0

  # File parsing
  docx_to_text: ^1.0.1
  syncfusion_flutter_pdf: ^27.1.48

  # Typography
  google_fonts: ^6.2.1
  google_generative_ai: ^0.4.7
  web: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
